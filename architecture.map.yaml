version: 2
system:
  id: floe-substrate
  name: floe-substrate
  intent: "Core event-driven architecture for autonomous workspaces"
  clusters:
    - id: floe-app
      name: Floe App
      intent: "Single UI surface served to plain browsers and wrapped by the Tauri desktop shell; one-server architecture (bus 5377, frontend 5379)"
      cells:
        - id: tauri-shell
          name: Tauri Shell
          intent: "Owns the desktop boundary, local file commands, and rust interop; wraps the shared 5379 frontend without managing its own vite server"
          paths:
            - floe-app/src-tauri/**
          writeAuthority:
            allowedModules: []
          modules:
            - id: main
              name: Main
              intent: "Primary tauri implementation"
              paths:
                - floe-app/src-tauri/**
        - id: app-ui
          name: App UI
          intent: "Owns the React state for the desktop operator interface"
          paths:
            - floe-app/src/**
            - floe-app/index.html
            - floe-app/vite.config.ts
            - floe-app/vitest.config.ts
          writeAuthority:
            allowedModules: []
          modules:
            - id: main
              name: Main
              intent: "Primary app UI implementation"
              paths:
                - floe-app/src/**
                - floe-app/index.html
                - floe-app/vite.config.ts
                - floe-app/vitest.config.ts
    - id: floe-bus
      name: Floe Bus
      intent: "Fastify substrate daemon and canonical event store"
      cells:
        - id: bus-store
          name: Bus Store
          intent: "Owns all mutable state in SQLite (workspaces, scopes, contexts, events, pulses, watermarks)"
          paths:
            - floe-bus/src/store.ts
            - floe-bus/src/contexts/**
            - floe-bus/src/scopes/**
            - floe-bus/src/endpoint-watermark-store.ts
            - floe-bus/src/scope-projection-layout-store.ts
            - floe-bus/src/event-cursor.ts
            - floe-bus/src/*test*
          writeAuthority:
            allowedModules: []
          modules:
            - id: main
              name: Main
              intent: "Primary store implementation"
              paths:
                - floe-bus/src/store.ts
                - floe-bus/src/contexts/**
                - floe-bus/src/scopes/**
                - floe-bus/src/endpoint-watermark-store.ts
                - floe-bus/src/scope-projection-layout-store.ts
                - floe-bus/src/event-cursor.ts
                - floe-bus/src/*test*
        - id: bus-server
          name: Bus Server
          intent: "Owns the HTTP and WebSocket external integration contracts (port 5377)"
          paths:
            - floe-bus/src/server.ts
            - floe-bus/src/index.ts
            - floe-bus/src/auth.ts
            - floe-bus/src/config.ts
            - floe-bus/src/live-model-probe.ts
            - floe-bus/vitest.config.ts
          writeAuthority:
            allowedModules: []
          modules:
            - id: main
              name: Main
              intent: "Primary server implementation"
              paths:
                - floe-bus/src/server.ts
                - floe-bus/src/index.ts
                - floe-bus/src/auth.ts
                - floe-bus/src/config.ts
                - floe-bus/src/live-model-probe.ts
                - floe-bus/vitest.config.ts
        - id: fs-api
          name: Workspace FS API
          intent: "Owns the server-side filesystem containment and agent file browsing contracts"
          paths:
            - floe-bus/src/fs/**
          writeAuthority:
            allowedModules: []
          modules:
            - id: main
              name: Main
              intent: "Primary FS API implementation"
              paths:
                - floe-bus/src/fs/**
        - id: pulse-scheduler
          name: Pulse Scheduler
          intent: "Owns the clock-based trigger mechanism"
          paths:
            - floe-bus/src/pulse-scheduler.ts
          writeAuthority:
            allowedModules: []
          modules:
            - id: main
              name: Main
              intent: "Primary pulse scheduler implementation"
              paths:
                - floe-bus/src/pulse-scheduler.ts
    - id: floe-bridge
      name: Floe Bridge
      intent: "Runtime boundary daemon for agent execution"
      cells:
        - id: extension-host
          name: Extension Host
          intent: "Owns the external contract for loading workspace extensions and hooks"
          paths:
            - floe-bridge/src/extension-loader.ts
            - floe-bridge/src/hooks.ts
            - floe-bridge/src/project.ts
            - floe-bridge/src/*test*
          writeAuthority:
            allowedModules: []
          modules:
            - id: main
              name: Main
              intent: "Primary extension host implementation"
              paths:
                - floe-bridge/src/extension-loader.ts
                - floe-bridge/src/hooks.ts
                - floe-bridge/src/project.ts
                - floe-bridge/src/*test*
        - id: runtime-adapters
          name: Runtime Adapters
          intent: "Owns the external integration with LLM providers and pi-agent-core"
          paths:
            - floe-bridge/src/adapters/**
          writeAuthority:
            allowedModules: []
          modules:
            - id: main
              name: Main
              intent: "Primary adapters implementation"
              paths:
                - floe-bridge/src/adapters/**
        - id: runtime-tools
          name: Runtime Tools
          intent: "Owns the local filesystem tools and command execution external contracts"
          paths:
            - floe-bridge/src/tools/**
          writeAuthority:
            allowedModules: []
          modules:
            - id: main
              name: Main
              intent: "Primary tools implementation"
              paths:
                - floe-bridge/src/tools/**
        - id: runtime-core
          name: Runtime Core
          intent: "Coordinates agent worklog and neutral references"
          paths:
            - floe-bridge/src/runtime-core/**
            - floe-bridge/src/daemon.ts
            - floe-bridge/src/auth.ts
            - floe-bridge/src/bus-client.ts
            - floe-bridge/src/config.ts
            - floe-bridge/src/index.ts
            - floe-bridge/src/prompt-assets.ts
            - floe-bridge/vitest.config.ts
          writeAuthority:
            allowedModules: []
          modules:
            - id: main
              name: Main
              intent: "Primary core implementation"
              paths:
                - floe-bridge/src/runtime-core/**
                - floe-bridge/src/daemon.ts
                - floe-bridge/src/auth.ts
                - floe-bridge/src/bus-client.ts
                - floe-bridge/src/config.ts
                - floe-bridge/src/index.ts
                - floe-bridge/src/prompt-assets.ts
                - floe-bridge/vitest.config.ts
    - id: floe-cli
      name: Floe CLI
      intent: "Command line interface for starting and managing floe processes"
      cells:
        - id: cli-process-manager
          name: CLI Process Manager
          intent: "Owns the process lifecycle management for the daemon"
          paths:
            - floe-cli/src/**
          writeAuthority:
            allowedModules: []
          modules:
            - id: main
              name: Main
              intent: "Primary CLI implementation"
              paths:
                - floe-cli/src/**
    - id: examples
      name: Examples
      intent: "Example code and extensions"
      cells:
        - id: todo-extension
          name: Todo Extension
          intent: "Example extension demonstrating tools"
          paths:
            - examples/extensions/todo/**
          writeAuthority:
            allowedModules: []
          modules:
            - id: main
              name: Main
              intent: "Primary todo extension implementation"
              paths:
                - examples/extensions/todo/**
    - id: system-tests
      name: System Tests
      intent: "End to end validation"
      cells:
        - id: e2e
          name: E2E
          intent: "Owns vertical slice tests"
          paths:
            - tests/**
          writeAuthority:
            allowedModules: []
          modules:
            - id: main
              name: Main
              intent: "Primary tests"
              paths:
                - tests/**
