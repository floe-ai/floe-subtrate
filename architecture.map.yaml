    - id: floe-web
      name: "Floe Web"
      intent: "Bootstrap draft cluster for Floe Web. Review and rename if needed."
      cells:
        - id: workspace-ui
          name: "Workspace UI"
          intent: "Owns the browser-rendered workspace experience, including shell composition, UI state, and the floe-web contract boundary to workspace and scope APIs."
          owns:
            mutableState:
              - "Browser workspace view state"
              - "Inspector, channel, and scope-map presentation state"
              - "Dialog interaction state"
            externalContracts:
              - "Floe Bus workspace HTTP APIs"
              - "Floe Bus scope projection stream and layout APIs"
          writeAuthority:
            allowedModules:
              - shell-surfaces
              - workspace-contracts
              - dialog
            notes:
              - "Only floe-web workspace UI modules may mutate browser workspace view state or dialog state."
              - "Other clusters may read through the published HTTP and event contracts but must not write floe-web browser state directly."
          paths:
            - floe-web/src/**
          dependsOn:
            cells: []
            externalContracts:
              - "Floe Bus workspace HTTP APIs"
              - "Floe Bus scope projection stream and layout APIs"
              - "React Flow renderer"
          modules:
            - id: shell-surfaces
              name: "Shell Surfaces"
              intent: "Smallest routing boundary for the rendered V6-style shell, navigation, home surface, activity surface, inspector, and scope-map composition."
              paths:
                - floe-web/src/main.tsx
                - floe-web/src/styles.css
                - floe-web/src/components/ui/**
                - floe-web/src/home-view-model.ts
                - floe-web/src/home-view-model.test.ts
                - floe-web/src/inspector-view-model.ts
                - floe-web/src/inspector-view-model.test.ts
                - floe-web/src/lib/utils.ts
              owns:
                mutableState:
                  - "Workspace shell composition state"
                  - "Rendered surface layout and inspector sizing state"
                externalContracts: []
              responsibilities:
                - "Compose the visible floe-web shell and route users between Home, Activity, Scope Map, Inspector, and Channel surfaces."
                - "Translate workspace, actor, and scope data into V6-aligned surface models."
                - "Own Tailwind and shadcn-backed shell foundation primitives used by the floe-web workspace chrome."
              allowedDependencies:
                cells: []
                externalContracts:
                  - "React Flow renderer"
            - id: workspace-content
              name: "Workspace Content"
              intent: "Owns pure workspace content shaping for activity, contexts, fields, and scope projection data consumed by the shell."
              paths:
                - floe-web/src/activity.ts
                - floe-web/src/activity.test.ts
                - floe-web/src/contexts.ts
                - floe-web/src/contexts.test.ts
                - floe-web/src/fields.ts
                - floe-web/src/fields.test.ts
                - floe-web/src/scope-projection.ts
                - floe-web/src/scope-projection.test.ts
              owns:
                mutableState: []
                externalContracts: []
              responsibilities:
                - "Normalize substrate-backed workspace data into content models used by the visible surfaces."
                - "Project scope data into React Flow-friendly nodes, edges, and layout structures."
              allowedDependencies:
                cells: []
                externalContracts:
                  - "React Flow renderer"
            - id: workspace-contracts
              name: "Workspace Contracts"
              intent: "Owns floe-web calls to workspace, scope, pulse, and context assignment APIs."
              paths:
                - floe-web/src/context-assignment-api.ts
                - floe-web/src/context-assignment-api.test.ts
                - floe-web/src/pulse-api.ts
                - floe-web/src/pulse-api.test.ts
                - floe-web/src/scope-projection-api.ts
                - floe-web/src/scope-projection-api.test.ts
              owns:
                mutableState: []
                externalContracts:
                  - "Floe Bus workspace HTTP APIs"
                  - "Floe Bus scope projection stream and layout APIs"
              responsibilities:
                - "Enforce request and response handling for workspace-backed browser interactions."
                - "Keep floe-web API adapters aligned with substrate-backed scope and pulse contracts."
              allowedDependencies:
                cells: []
                externalContracts:
                  - "Floe Bus workspace HTTP APIs"
                  - "Floe Bus scope projection stream and layout APIs"
            - id: dialog
